openapi: "3.0.0"
info:
  title: MiniLib
  description: API de gestion de bibliothèque (livres, adhérents, emprunts).
  version: "1.0.0"

servers:
  - url: "http://localhost:5000/api/v1"

paths:
  /health:
    get:
      summary: Test état du serveur
      description: Renvoie l'état du serveur.
      responses:
        '200':
          description: Serveur actif.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
                  timestamp:
                    type: string
                    example: "2026-03-24T13:00:00Z"
                  message:
                    type: string
                    example: "Serveur opérationnel"
        '500':
          description: Erreur interne.

  /livres:
    get:
      summary: Liste des livres
      description: Récupère tous les livres avec filtres optionnels.
      parameters:
        - in: query
          name: genre
          schema:
            type: string
          description: "Genre du livre (ex: Roman, SF, Fantasy)"
          example: "Roman"
        - in: query
          name: disponible
          schema:
            type: boolean
          description: Livre disponible (true) ou non (false)
      responses:
        '200':
          description: Liste des livres.
    post:
      summary: Créer un livre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titre:
                  type: string
                auteur:
                  type: string
                genre:
                  type: string
                isbn:
                  description: ISBN du livre 
                  example: "978-3-16-148410-0"
                  type: string
                
      responses:
        '201':
          description: Livre créé.

  /livres/{id}:
    get:
      summary: Détail d’un livre
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Livre trouvé.
        '404':
          description: Livre introuvable.
    put:
      summary: Mettre à jour un livre
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Livre mis à jour.
    delete:
      summary: Supprimer un livre
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Livre supprimé.

  /livres/recherche:
    get:
      summary: Recherche de livres
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: genre
          schema:
            type: string
        - in: query
          name: disponible
          schema:
            type: boolean
      responses:
        '200':
          description: Résultats de la recherche.

  /adherents:
    get:
      summary: Liste des adhérents
      description: Récupère tous les adhérents actifs.
      responses:
        '200':
          description: Liste des adhérents actifs.
    post:
      summary: Créer un adhérent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nom:
                  type: string
                prenom:
                  type: string
      responses:
        '201':
          description: Adhérent créé.

  /adherents/{id}:
    get:
      summary: Détail d’un adhérent
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Adhérent trouvé.
        '404':
          description: Adhérent introuvable.
    put:
      summary: Mettre à jour un adhérent
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Adhérent mis à jour.
    delete:
      summary: Rendre un adhérent inactif
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Adhérent rendu inactif.